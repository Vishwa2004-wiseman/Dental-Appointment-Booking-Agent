# Render Blueprint — deploy with one click from the repo.
services:
  - type: web
    name: dental-booking-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCK_MODE
        value: "false"
      - key: CLINIC_ID
        value: demo-clinic-001
      - key: APPOINTMENT_DURATION_MINUTES
        value: "30"
      - key: CLINIC_TIMEZONE
        value: Asia/Kolkata
      # --- secrets: set these in the Render dashboard ---
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: VAPI_WEBHOOK_SECRET
        sync: false
      - key: BASE_URL
        sync: false
