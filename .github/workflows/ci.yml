name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # State-machine + orchestrator tests run with zero dependencies (mock mode),
      # so CI is fast and needs no secrets.
      - name: Run logic tests
        run: node scripts/test-flow.js
      - name: Install deps and syntax-check the app
        run: |
          npm install --no-audit --no-fund
          node --check src/index.js
